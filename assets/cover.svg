<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Research: A New Scientific Workspace</title>
  <desc id="desc">A blue and white editorial cover showing a scientist, research agents, knowledge graphs, evidence, notebooks, and governed scientific workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="48%" stop-color="#eaf5ff"/>
      <stop offset="100%" stop-color="#d8ecff"/>
    </linearGradient>
    <radialGradient id="hub" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#54d9ff"/>
      <stop offset="55%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#063a78"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .navy{fill:#082653}.blue{fill:#0f62b8}.cyan{fill:#26c6da}.muted{fill:#4b6b91}.card{fill:#ffffff;stroke:#b8ddff;stroke-width:1.5;opacity:.9}.line{stroke:#58d6ff;stroke-width:2.2;fill:none;opacity:.7}.thin{stroke:#8edfff;stroke-width:1.2;opacity:.55}.label{font-family:Inter,IBM Plex Sans,Arial,sans-serif;font-size:20px;font-weight:700;letter-spacing:.02em}.small{font-family:Inter,IBM Plex Sans,Arial,sans-serif;font-size:14px;fill:#315476}.micro{font-family:Inter,IBM Plex Sans,Arial,sans-serif;font-size:11px;fill:#557091}.title{font-family:Inter,IBM Plex Sans,Arial,sans-serif;font-size:72px;font-weight:850;letter-spacing:-.045em}.subtitle{font-family:Inter,IBM Plex Sans,Arial,sans-serif;font-size:38px;font-weight:720;letter-spacing:-.025em}.kicker{font-family:Inter,IBM Plex Sans,Arial,sans-serif;font-size:20px;font-weight:650;fill:#0f62b8}.pill{fill:#e7f7ff;stroke:#9bdbff;stroke-width:1}.pilltext{font-family:Inter,IBM Plex Sans,Arial,sans-serif;font-size:15px;font-weight:700;fill:#0b3b75}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 510 C180 450 280 585 430 530 S690 430 875 500 1060 600 1200 520 L1200 630 L0 630 Z" fill="#cfefff" opacity=".45"/>
  <path d="M0 565 C220 490 320 650 520 560 S790 455 1000 555 1120 610 1200 570" class="thin"/>
  <text x="62" y="115" class="kicker">OPEN AUTONOMYX · RESEARCH DEVELOPMENT</text>
  <text x="62" y="210" class="title navy">The Future</text>
  <text x="62" y="287" class="title navy">of Research</text>
  <rect x="62" y="320" width="118" height="6" rx="3" fill="#23c7df"/>
  <text x="62" y="380" class="subtitle navy">A New Scientific</text>
  <text x="62" y="430" class="subtitle navy">Workspace</text>
  <text x="62" y="472" font-family="Inter,IBM Plex Sans,Arial,sans-serif" font-size="22" font-weight="650" fill="#315476">From AI assistant to orchestrated research fabric</text>
  <g transform="translate(62 510)">
    <rect width="260" height="34" rx="17" class="pill"/><text x="18" y="23" class="pilltext">Search → Scientific Execution</text>
    <rect x="0" y="44" width="315" height="34" rx="17" class="pill"/><text x="18" y="67" class="pilltext">Summaries → Decision-Ready Evidence</text>
    <rect x="0" y="88" width="352" height="34" rx="17" class="pill"/><text x="18" y="111" class="pilltext">Fragmented Tools → Research OS</text>
  </g>
  <g filter="url(#glow)">
    <path class="line" d="M720 285 C640 220 610 150 545 110"/>
    <path class="line" d="M720 285 C625 275 600 290 520 275"/>
    <path class="line" d="M720 285 C630 340 610 430 540 465"/>
    <path class="line" d="M760 275 C840 205 870 135 950 115"/>
    <path class="line" d="M760 292 C850 300 890 308 970 300"/>
    <path class="line" d="M760 315 C830 390 875 440 965 475"/>
  </g>
  <circle cx="740" cy="300" r="78" fill="url(#hub)" filter="url(#glow)"/>
  <text x="740" y="290" text-anchor="middle" font-family="Inter,IBM Plex Sans,Arial,sans-serif" font-size="18" font-weight="850" fill="#fff">RESEARCH</text>
  <text x="740" y="315" text-anchor="middle" font-family="Inter,IBM Plex Sans,Arial,sans-serif" font-size="18" font-weight="850" fill="#fff">AGENTS</text>
  <g stroke="#fff" stroke-width="1.5" fill="none" opacity=".92">
    <circle cx="716" cy="254" r="4" fill="#fff"/><circle cx="760" cy="250" r="4" fill="#fff"/><circle cx="770" cy="286" r="4" fill="#fff"/><circle cx="710" cy="300" r="4" fill="#fff"/><circle cx="744" cy="335" r="4" fill="#fff"/>
    <path d="M716 254 L760 250 L770 286 L744 335 L710 300 Z M716 254 L770 286 M760 250 L710 300 M710 300 L744 335"/>
  </g>
  <g>
    <rect x="480" y="76" width="180" height="90" rx="14" class="card"/><text x="500" y="105" class="label blue">Literature</text><text x="500" y="128" class="small">papers · patents · data</text><path d="M605 104 h30 M605 122 h24 M605 140 h38" stroke="#3d8fe0" stroke-width="3"/>
    <rect x="468" y="236" width="190" height="96" rx="14" class="card"/><text x="488" y="266" class="label blue">Evidence</text><text x="488" y="290" class="small">support · gaps · claims</text><path d="M598 292 l18-30 l17 13 l20-42" stroke="#20a7dd" stroke-width="4" fill="none"/>
    <rect x="478" y="424" width="190" height="92" rx="14" class="card"/><text x="498" y="454" class="label blue">Notebook</text><text x="498" y="478" class="small">code · plots · methods</text><rect x="590" y="450" width="48" height="35" rx="4" fill="#0b3b75" opacity=".85"/>
    <rect x="910" y="80" width="210" height="96" rx="14" class="card"/><text x="930" y="111" class="label blue">Knowledge Graph</text><text x="930" y="135" class="small">relationships · context</text><g stroke="#20a7dd" fill="#20a7dd"><circle cx="1040" cy="111" r="4"/><circle cx="1075" cy="130" r="4"/><circle cx="1038" cy="149" r="4"/><circle cx="1090" cy="102" r="4"/><path d="M1040 111 L1075 130 L1038 149 L1040 111 L1090 102 L1075 130" fill="none"/></g>
    <rect x="940" y="250" width="205" height="100" rx="14" class="card"/><text x="960" y="282" class="label blue">Simulation</text><text x="960" y="306" class="small">models · risks · outcomes</text><path d="M1080 319 c10-45 45-45 50 0" stroke="#20a7dd" stroke-width="4" fill="none"/>
    <rect x="910" y="430" width="210" height="92" rx="14" class="card"/><text x="930" y="460" class="label blue">Governance</text><text x="930" y="484" class="small">provenance · policy · HITL</text><circle cx="1075" cy="475" r="21" fill="#24c6a7" opacity=".9"/><path d="M1064 475 l8 8 l17-20" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g opacity=".82" stroke="#5bd7ff" stroke-width="1.5" fill="none">
    <path d="M1050 50 C1110 115 1048 170 1105 235 S1055 350 1120 420"/>
    <path d="M1095 50 C1040 115 1102 170 1045 235 S1095 350 1030 420"/>
    <path d="M1058 85 h40 M1060 125 h34 M1056 168 h44 M1054 210 h48 M1048 255 h55 M1040 306 h63 M1038 356 h62"/>
  </g>
  <g transform="translate(545 525)">
    <rect width="500" height="54" rx="27" fill="#ffffff" opacity=".65" stroke="#b8ddff"/>
    <text x="40" y="35" class="pilltext">ORCHESTRATE</text><text x="168" y="35" class="pilltext">→</text><text x="205" y="35" class="pilltext">REASON</text><text x="305" y="35" class="pilltext">→</text><text x="342" y="35" class="pilltext">ACT</text><text x="405" y="35" class="pilltext">→ LEARN</text>
  </g>
</svg>
